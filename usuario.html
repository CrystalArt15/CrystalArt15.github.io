<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - Crystal Art</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container-fluid px-0 d-flex flex-column" style="min-height: 100vh;">

        <div class="barra-superior-rosa py-2 px-3">
            <div class="container-fluid d-flex flex-wrap align-items-center justify-content-between gap-2">
                
                <div class="d-flex gap-1">
                    <a href="#" class="btn btn-light btn-sm font-weight-bold" style="width:30px; height:30px; line-height:15px;">←</a>
                    <a href="#" class="btn btn-light btn-sm font-weight-bold" style="width:30px; height:30px; line-height:15px;">→</a>
                    <a href="#" class="btn btn-light btn-sm font-weight-bold" style="width:30px; height:30px; line-height:15px;">⭯</a>
                </div>

                <div class="flex-grow-1 mx-2 mx-md-5" style="max-width: 500px;">
                    <input type="text" placeholder="Buscar..." class="form-control form-control-sm input-busqueda-personalizado">
                </div>

                <div>   
                    <a href="usuario.html" class="btn p-0">
                        <img src="imagenes/usuario2.jpg" alt="User" class="rounded-circle-user bg-white" style="width:32px; height:32px; border: 1px solid #ccc;">
                    </a>
                </div> 
            </div>
        </div>

        <nav class="barra-navegacion-principal py-3 border-bottom bg-white">
            <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-3">
                
                <div class="bloque-logo">
                    <img src="imagenes/logoCA.png" alt="Crystal Art Logo" class="img-fluid logo-marca" style="max-width: 140px; height: auto; display: block;">
                </div>

                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <a href="index.html" class="btn btn-rosacl">Inicio</a>
                    
                    <div class="btn-group">
                        <button type="button" class="btn btn-rosacl dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            Catálogo de Productos
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="kits.html">Kits</a></li>
                            <li><a class="dropdown-item" href="lienzos.html">Lienzos</a></li>
                            <li><a class="dropdown-item" href="piedras.html">Piedras</a></li>
                            <li><a class="dropdown-item" href="resina.html">Resina</a></li>
                            <li><a class="dropdown-item" href="boligrafos.html">Boligrafos</a></li>
                            <li><a class="dropdown-item" href="figuras3d.html">Figuras 3D</a></li>
                            <li><a class="dropdown-item" href="accesorios.html">Accesorios</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="novedades.html">Novedades</a></li>
                        </ul>
                    </div>

                    <a href="contactos.html" class="btn btn-rosacl">Contactos y Preguntas</a>
                </div>
            </div>
        </nav>

        <div class="w-100 text-center py-3 bg-rosa border-bottom">
            <h2 class="m-0 fw-bold fs-4 text-dark" style="font-family: 'Times New Roman', Times, serif;">
                Perfil de Usuario
            </h2>
        </div>

        <main class="flex-grow-1 d-flex align-items-center justify-content-center w-100 my-5 px-3">
            <div class="w-100" style="max-width: 480px;">
                
                <div class="p-4 rounded shadow" style="background-color: #e28787;">
                    
                    <div class="bg-white p-4 rounded shadow-sm text-start">
                        
                        <div class="text-center mb-4 border-bottom pb-3">
                            <img src="imagenes/usuario2.jpg" alt="Avatar Perfil" class="rounded-circle mb-2" style="width: 60px; height: 60px; object-fit: cover; border: 2px solid #ffc0cb;">
                            <h3 class="fw-bold text-dark fs-4 m-0" style="font-family: 'Times New Roman', Times, serif;">Crystal Art</h3>
                        </div>

                        <form action="index.html" method="GET">
                            
                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold small text-muted">Email:</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter email" name="email" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold small text-muted">Nombre de Usuario:</label>
                                <input type="text" class="form-control" id="name" placeholder="Enter Name" name="namex" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="pwd" class="form-label fw-bold small text-muted">Contraseña:</label>
                                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd" required>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="remember" name="remember">
                                <label class="form-check-label small text-secondary fw-bold" for="remember">
                                    Recuérdamelo
                                </label>
                            </div>
                            
                            <div class="w-100">
                                <button type="submit" class="btn btn-rosa w-100 py-2 fw-bold text-dark fs-5">Continuar</button>
                            </div>

                        </form>
                        
                    </div>

                </div>

            </div>
        </main>

    </div>
</body>
</html>
